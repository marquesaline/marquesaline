    journey:
      title: "Minha Jornada"
      text: "Iniciei minha carreira como desenvolvedora em 2022, atuando como Full Stack com Node.js e Angular.
        Depois, trabalhei com Django e Angular, o que ampliou minha experiência em backend e arquitetura.
        Com o tempo, comecei a trabalhar com Ruby on Rails e passei a focar nessa tecnologia, atuando em projetos maiores e em produção.<br><br>
        Hoje trabalho com um stack mais amplo, incluindo React, Node.js e GraphQL, com ênfase em performance, integrações com serviços externos e evolução de plataformas em produção."
    
